<!DOCTYPE html> 
<html lang="ar"> 
    <head> 
        <meta charset="UTF-8"> 
        <title>نظام إدارة الدورات</title> 
        <style> body { font-family: "Tahoma", Arial; direction: rtl; margin: 0; background: #f1f4f8; } /* الهيدر */ .header { background: #0b3d2e; color: white; padding: 15px; text-align: center; font-size: 20px; } /* الحاوية */ .container { width: 95%; max-width: 900px; margin: 20px auto; } /* الكرت */ .card { background: white; border-radius: 10px; padding: 20px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); } /* العناوين */ h2 { margin-bottom: 15px; color: #0b3d2e; } /* الحقول */ input { width: 100%; padding: 10px; margin-bottom: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 14px; } /* الأزرار */ button { padding: 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; margin-top: 5px; } .btn-primary { background: #0b3d2e; color: white; width: 100%; } .btn-secondary { background: #6c757d; color: white; width: 100%; } /* الجدول */ table { width: 100%; border-collapse: collapse; margin-top: 10px; } th { background: #0b3d2e; color: white; } td, th { padding: 10px; border: 1px solid #ddd; text-align: center; } tr:nth-child(even) { background: #f9f9f9; } /* رسالة */ #msg { margin-top: 10px; font-weight: bold; } /* متجاوب */ @media (max-width: 600px) { th, td { font-size: 12px; padding: 6px; } } </style>
     </head>
      <body> 
        <div class="header"> 🏛️ نظام إدارة الدورات التدريبية </div> 
        <div class="container"> <!-- نموذج الإدخال --> <div class="card"> <h2>تسجيل دورة جديدة</h2> 
            <form id="form" target="hidden_iframe" method="POST" action="https://script.google.com/macros/s/AKfycbzVeH-hAg9TntmQg1VHM6hOZmSoUHWEbRNK0jAGPN_7yor__LuukDqhwKRSibXjnI190w/exec"> 
                <input name="name" placeholder="اسم الموظف" required>
                 <input name="course" placeholder="اسم الدورة" required>
                 <input name="year" placeholder="السنة" required> 
                 <input name="type" placeholder="نوع الدورة" required> 
                 <button type="submit" class="btn-primary">حفظ البيانات</button> 
                </form> <p id="msg"></p> </div> <!-- عرض البيانات --> <div class="card"> 
                    <h2>سجل الدورات</h2>
                     <button onclick="loadData()" class="btn-secondary">تحديث البيانات</button>
                      <table id="table"> <thead> 
                        <tr> <th>الاسم</th> 
                            <th>الدورة</th> 
                            <th>السنة</th> 
                            <th>النوع</th>
                         </tr> 
                        </thead> 
                        <tbody></tbody> </table> </div> </div> <iframe name="hidden_iframe" style="display:none;"></iframe> 
                        <script> const url = "https://script.google.com/macros/s/AKfycbzVeH-hAg9TntmQg1VHM6hOZmSoUHWEbRNK0jAGPN_7yor__LuukDqhwKRSibXjnI190w/exec"; // عند الإرسال document.getElementById("form").addEventListener("submit", function(){ document.getElementById("msg").innerText = "⏳ جاري الحفظ..."; setTimeout(()=>{ document.getElementById("msg").innerText = "✅ تم الحفظ بنجاح"; loadData(); },1500); }); // تحميل البيانات function loadData(){ fetch(url) .then(res=>res.json()) .then(data=>{ let rows=""; data.forEach(d=>{ rows+=` <tr> <td>${d.name}</td> <td>${d.course}</td> <td>${d.year}</td> <td>${d.type}</td> </tr>`; }); document.querySelector("#table tbody").innerHTML = rows; }); } // تحميل تلقائي loadData(); </script> </body> </html>
