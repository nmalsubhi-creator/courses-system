<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام إدارة الدورات الرسمي</title>

<style>
body {font-family:tahoma; direction:rtl; margin:0; background:#eef2f7;}
.header {background:#0b3d2e; color:#fff; padding:15px; text-align:center;}

.container {max-width:1100px; margin:auto; padding:10px;}

.card {background:#fff; padding:15px; margin:10px 0; border-radius:10px;}

input {width:100%; padding:10px; margin:5px 0;}

button {padding:8px; border:none; border-radius:5px; cursor:pointer;}

.btn-save {background:#0b3d2e; color:#fff;}
.btn-del {background:red; color:#fff;}
.btn-print {background:#007bff; color:#fff;}

table {width:100%; border-collapse:collapse;}
th {background:#0b3d2e; color:#fff;}
td,th {border:1px solid #ddd; padding:8px; text-align:center;}
</style>
</head>

<body>

<div class="header">🏛️ نظام إدارة الدورات - جهة حكومية</div>

<div class="container">

<div class="card">
<h3>إضافة دورة</h3>

<input id="name" placeholder="اسم الموظف">
<input id="course" placeholder="الدورة">
<input id="year" placeholder="السنة">
<input id="type" placeholder="النوع">

<button class="btn-save" onclick="add()">حفظ</button>
<p id="msg"></p>
</div>

<div class="card">
<h3>بحث</h3>
<input id="search" placeholder="ابحث..." onkeyup="filter()">
<button class="btn-print" onclick="printPage()">طباعة</button>
</div>

<div class="card">
<table id="table">
<thead>
<tr>
<th>رقم</th>
<th>الاسم</th>
<th>الدورة</th>
<th>السنة</th>
<th>النوع</th>
<th>إدارة</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbzX1HnwNiNA1Nu5OJu_hUo5W-qD0AuZ4q5WImEUyS6A9K7ImB3v-YwlNDr2z7E5px_H/exec";

let allData=[];

// إضافة
function add(){
let d=new URLSearchParams();
d.append("action","add");
d.append("name",name.value);
d.append("course",course.value);
d.append("year",year.value);
d.append("type",type.value);

fetch(url,{method:"POST",body:d,mode:"no-cors"})
.then(()=>{
msg.innerText="✅ تم الحفظ";
load();
});
}

// حذف
function del(id){
if(confirm("هل تريد الحذف؟")){
let d=new URLSearchParams();
d.append("action","delete");
d.append("id",id);

fetch(url,{method:"POST",body:d,mode:"no-cors"})
.then(()=>load());
}
}

// تحميل
function load(){
fetch(url)
.then(r=>r.json())
.then(data=>{
allData=data;
render(data);
});
}

// عرض
function render(data){
let rows="";
data.forEach(d=>{
rows+=`
<tr>
<td>${d.id}</td>
<td>${d.name}</td>
<td>${d.course}</td>
<td>${d.year}</td>
<td>${d.type}</td>
<td><button class="btn-del" onclick="del('${d.id}')">حذف</button></td>
</tr>`;
});
table.querySelector("tbody").innerHTML=rows;
}

// بحث
function filter(){
let val=search.value.toLowerCase();
render(allData.filter(d=>d.name.toLowerCase().includes(val)));
}

// طباعة
function printPage(){
window.print();
}

load();
</script>

</body>
</html>
