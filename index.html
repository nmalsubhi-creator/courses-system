<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام الدورات</title>

<style>
body {font-family: Arial; direction: rtl; text-align:center; background:#f5f5f5;}
.container {background:white; padding:20px; margin:20px auto; width:90%; max-width:600px; border-radius:10px;}
input, button {width:90%; padding:10px; margin:5px;}
button {background:#007bff; color:white; border:none; cursor:pointer;}
</style>

</head>
<body>

<div class="container">
<h2>📋 تسجيل دورة</h2>

<input id="name" placeholder="اسم الموظف">
<input id="course" placeholder="اسم الدورة">
<input id="year" placeholder="السنة">
<input id="type" placeholder="نوع الدورة">

<!-- الزر الصحيح -->
<button onclick="send()">إرسال</button>

<p id="msg"></p>
</div>

<script>
const url = "https://username.github.io/courses-system/";

function send(){
let d = new URLSearchParams();

d.append("name", document.getElementById("name").value);
d.append("course", document.getElementById("course").value);
d.append("year", document.getElementById("year").value);
d.append("type", document.getElementById("type").value);

fetch(url, {method:"POST", body:d})
.then(res => res.text())
.then(data => {
    document.getElementById("msg").innerText = "✅ تم الحفظ";
})
.catch(err => {
    document.getElementById("msg").innerText = "❌ حصل خطأ";
});
}
</script>

</body>
</html>
