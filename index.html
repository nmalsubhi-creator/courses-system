<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام إدارة الدورات الرسمي</title>

<style>
body {font-family:tahoma; direction:rtl; background:#eef2f7;}
.then(()=>{
  msg.innerText="✅ تم الإرسال (تحقق من الشيت)";
});

.container {max-width:1100px; margin:auto;}
.card {background:#fff; padding:15px; margin:10px; border-radius:10px;}

input {width:100%; padding:10px; margin:5px 0;}

button {padding:8px; border:none; border-radius:5px; cursor:pointer;}
.btn-save {background:#0b3d2e; color:#fff;}
.btn-del {background:red; color:#fff;}
.btn-edit {background:orange; color:#fff;}
.btn-print {background:#007bff; color:#fff;}

table {width:100%; border-collapse:collapse;}
th {background:#0b3d2e; color:#fff;}
td,th {border:1px solid #ddd; padding:8px; text-align:center;}
  @media print {
  body * {
    visibility: hidden;
  }

  #printArea, #printArea * {
    visibility: visible;
  }

  #printArea {
    position: absolute;
    top: 0;
    right: 0;
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="header">🏛️ نظام إدارة الدورات</div>

<div class="container">
  
  <input type="text" name="name" placeholder="اسم الموظف" required><br>
  <input type="text" name="course" placeholder="اسم الدورة" required><br>
  <input type="number" name="year" placeholder="السنة" required><br>
  <input type="text" name="type" placeholder="نوع الدورة" required><br>
  <button onclick="send()">إرسال</button>

<p id="msg"></p>
</div>
<div id="printArea">
  <div class="card">
<table id="table">
<thead>
<tr>
<th>رقم</th>
<th>الاسم</th>
<th>الدورة</th>
<th>السنة</th>
<th>النوع</th>
<th>إدارة</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>
<h2 style="text-align:center;">🏛️ سجل الدورات التدريبية</h2>
<p>تاريخ الطباعة: <span id="date"></span></p>

<div class="card">
<input id="search" placeholder="بحث..." onkeyup="filter()">
<button class="btn-print" onclick="printPage()">طباعة</button>
</div>
<script>
const url = "https://script.google.com/macros/s/AKfycbypXJCrGCpMCj2KLTJMnDEGHB0xmHitEJTMNgHpEIiR8QQFtEa17SNXr75KWusBL9P7IA/exec";

// حفظ (إضافة + تعديل)
function doPost(e) {
  const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("courses");

  if (!e || !e.parameter) {
    return ContentService.createTextOutput("No data");
  }

  const action = e.parameter.action;

  // إضافة
  if (action == "add") {
    const id = new Date().getTime();

    sheet.appendRow([
      id,
      e.parameter.name || "",
      e.parameter.course || "",
      e.parameter.year || "",
      e.parameter.type || "",
      new Date()
    ]);
  }

  // حذف
  if (action == "delete") {
    const id = e.parameter.id;
    const data = sheet.getDataRange().getValues();

    for (let i = 1; i < data.length; i++) {
      if (data[i][0] == id) {
        sheet.deleteRow(i + 1);
        break;
      }
    }
  }

  // تعديل
  if (action == "edit") {
    const id = e.parameter.id;
    const data = sheet.getDataRange().getValues();

    for (let i = 1; i < data.length; i++) {
      if (data[i][0] == id) {
        sheet.getRange(i + 1, 2, 1, 4).setValues([[
          e.parameter.name || "",
          e.parameter.course || "",
          e.parameter.year || "",
          e.parameter.type || ""
        ]]);
        break;
      }
    }
  }

  return ContentService.createTextOutput("ok");
}

function doGet() {
  const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("courses");
  const data = sheet.getDataRange().getValues();

  let result = [];

  for (let i = 1; i < data.length; i++) {
    result.push({
      id: data[i][0],
      name: data[i][1],
      course: data[i][2],
      year: data[i][3],
      type: data[i][4]
    });
  }

  return ContentService
    .createTextOutput(JSON.stringify(result))
    .setMimeType(ContentService.MimeType.JSON);
}


load();
</script>

</body>
</html>
