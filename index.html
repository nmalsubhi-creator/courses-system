<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام إدارة الدورات الرسمي</title>

<style>
body {font-family:tahoma; direction:rtl; background:#eef2f7;}
.then(()=>{
  msg.innerText="✅ تم الإرسال (تحقق من الشيت)";
});

.container {max-width:1100px; margin:auto;}
.card {background:#fff; padding:15px; margin:10px; border-radius:10px;}

input {width:100%; padding:10px; margin:5px 0;}

button {padding:8px; border:none; border-radius:5px; cursor:pointer;}
.btn-save {background:#0b3d2e; color:#fff;}
.btn-del {background:red; color:#fff;}
.btn-edit {background:orange; color:#fff;}
.btn-print {background:#007bff; color:#fff;}

table {width:100%; border-collapse:collapse;}
th {background:#0b3d2e; color:#fff;}
td,th {border:1px solid #ddd; padding:8px; text-align:center;}
  @media print {
  body * {
    visibility: hidden;
  }

  #printArea, #printArea * {
    visibility: visible;
  }

  #printArea {
    position: absolute;
    top: 0;
    right: 0;
    width: 100%;
  }
}
</style>
</head>

<body>

<div class="header">🏛️ نظام إدارة الدورات</div>

<div class="container">

<div class="card">
<input id="name" placeholder="اسم الموظف">
<input id="course" placeholder="الدورة">
<input id="year" placeholder="السنة">
<input id="type" placeholder="النوع">

<button class="btn-save" onclick="save()">حفظ</button>
<p id="msg"></p>
</div>
<div id="printArea">
  <div class="card">
<table id="table">
<thead>
<tr>
<th>رقم</th>
<th>الاسم</th>
<th>الدورة</th>
<th>السنة</th>
<th>النوع</th>
<th>إدارة</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>
</div>
<h2 style="text-align:center;">🏛️ سجل الدورات التدريبية</h2>
<p>تاريخ الطباعة: <span id="date"></span></p>

<div class="card">
<input id="search" placeholder="بحث..." onkeyup="filter()">
<button class="btn-print" onclick="printPage()">طباعة</button>
</div>
<script>
const url = "https://script.google.com/macros/s/AKfycbyaZa57IyApa7F0QRdb466etOYydYoTgPnhMRXUxt4YkcPk1O0w8Z9nrEulDPKQFAjP/exec";

let editId = null;
let allData = [];

// حفظ (إضافة + تعديل)
function save(){
  if(!name.value || !course.value){
    msg.innerText="⚠️ عبئ البيانات";
    return;
  }

  let link = url +
    "?action=" + (editId ? "edit&id="+editId : "add") +
    "&name=" + encodeURIComponent(name.value) +
    "&course=" + encodeURIComponent(course.value) +
    "&year=" + encodeURIComponent(year.value) +
    "&type=" + encodeURIComponent(type.value);

  fetch(link)
  .then(()=> {
    msg.innerText="✅ تم الحفظ";
    clearForm();
    load();
  })
  .catch(()=> {
    msg.innerText="❌ فشل الإرسال";
  });
}

// حذف
function del(id){
  if(confirm("حذف؟")){
    let d=new URLSearchParams();
    d.append("action","delete");
    d.append("id",id);

    fetch(url,{method:"POST",body:d})
    .then(()=>load());
  }
}

// تعديل
function edit(d){
  name.value = d.name;
  course.value = d.course;
  year.value = d.year;
  type.value = d.type;

  editId = d.id;
}

// تحميل
function load(){
  fetch(url)
  .then(r=>r.json())
  .then(data=>{
    allData=data;
    render(data);
  });
}

// عرض
function render(data){
  let rows="";

  data.forEach(d=>{
    rows+=`
    <tr>
    <td>${d.id}</td>
    <td>${d.name}</td>
    <td>${d.course}</td>
    <td>${d.year}</td>
    <td>${d.type}</td>
    <td>
    <button class="btn-edit" onclick='edit(${JSON.stringify(d)})'>تعديل</button>
    <button class="btn-del" onclick="del('${d.id}')">حذف</button>
    </td>
    </tr>`;
  });

  document.querySelector("#table tbody").innerHTML=rows;
}

// بحث
function filter(){
  let v=search.value.toLowerCase();
  render(allData.filter(d=>d.name.toLowerCase().includes(v)));
}

// تنظيف
function clearForm(){
  name.value="";
  course.value="";
  year.value="";
  type.value="";
  editId=null;
}
  function printPage(){
  document.getElementById("date").innerText =
    new Date().toLocaleDateString();

  window.print();
}

load();
</script>

</body>
</html>
