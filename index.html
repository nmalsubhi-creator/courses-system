<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>نظام الدورات</title>

<style>
body {
    font-family: Arial;
    direction: rtl;
    text-align: center;
    background: #f5f5f5;
}

.container {
    background: white;
    padding: 20px;
    margin: 20px auto;
    width: 90%;
    max-width: 700px;
    border-radius: 10px;
}

input, button {
    width: 90%;
    padding: 10px;
    margin: 5px;
}

button {
    background: #007bff;
    color: white;
    border: none;
    cursor: pointer;
}

table {
    width: 100%;
    margin-top: 15px;
    border-collapse: collapse;
}

td, th {
    border: 1px solid #ccc;
    padding: 8px;
}
</style>

</head>

<body>

<div class="container">

<h2>📋 تسجيل دورة</h2>

<form method="POST"
action="https://script.google.com/macros/s/AKfycbyVkcYqyrUU56kk-oTXDWI1ZQUqGW2d1QhEENqVFBVjRKW7IYrbC46cgR6H_2pmFvp7/exec"
target="hidden_iframe">

<input name="name" placeholder="اسم الموظف" required>
<input name="course" placeholder="اسم الدورة" required>
<input name="year" placeholder="السنة" required>
<input name="type" placeholder="نوع الدورة" required>

<button type="submit">إرسال</button>

</form>

<iframe name="hidden_iframe" style="display:none;"></iframe>

<p id="msg"></p>

<table id="table">
<thead>
<tr>
<th>الاسم</th>
<th>الدورة</th>
<th>السنة</th>
<th>النوع</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
const url = "https://script.google.com/macros/s/AKfycbyVkcYqyrUU56kk-oTXDWI1ZQUqGW2d1QhEENqVFBVjRKW7IYrbC46cgR6H_2pmFvp7/exec";

function send(){

let nameVal = document.getElementById("name").value;
let courseVal = document.getElementById("course").value;
let yearVal = document.getElementById("year").value;
let typeVal = document.getElementById("type").value;

if(!nameVal || !courseVal || !yearVal || !typeVal){
document.getElementById("msg").innerText = "⚠️ عبي كل الحقول";
return;
}

let d = new URLSearchParams();

d.append("name", nameVal);
d.append("course", courseVal);
d.append("year", yearVal);
d.append("type", typeVal);

fetch(url,{
method:"POST",
body:d,
mode:"no-cors"
})
.then(()=>{
document.getElementById("msg").innerText = "✅ تم الحفظ";

document.getElementById("name").value = "";
document.getElementById("course").value = "";
document.getElementById("year").value = "";
document.getElementById("type").value = "";

setTimeout(loadData, 1000);
});
}

function loadData(){
fetch(url)
.then(res => res.json())
.then(data => {

let rows = "";

data.forEach(d => {
rows += `
<tr>
<td>${d.name || ""}</td>
<td>${d.course || ""}</td>
<td>${d.year || ""}</td>
<td>${d.type || ""}</td>
</tr>
`;
});

document.querySelector("#table tbody").innerHTML = rows;

})
.catch(() => {
document.getElementById("msg").innerText = "❌ تأكد من نشر السكربت";
});
}

loadData();
</script>

</body>
</html>
